<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0A1628">
    <title>Server Error — Distance Hotel</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --distance-blue: #0A1628;
            --distance-blue-light: #1E3A5F;
            --distance-blue-bright: #2563EB;
            --bg-primary: #F8FAFC;
            --bg-card: #FFFFFF;
            --text-primary: #0F172A;
            --text-muted: #64748B;
            --text-inverse: #FFFFFF;
            --radius-xl: 24px;
            --shadow-xl: 0 12px 40px rgba(10, 22, 40, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .error-container {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            max-width: 480px;
            width: 100%;
            padding: 3rem;
            text-align: center;
            border: 1px solid #E2E8F0;
        }

        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            font-weight: 700;
            color: #ef4444;
            line-height: 1;
            opacity: 0.15;
            margin-bottom: -2rem;
        }

        .error-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #fef2f2 0%, #fecaca 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .error-icon i {
            color: #ef4444;
            font-size: 2rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            margin-bottom: 0.75rem;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.7;
        }

        .btn-home {
            background: linear-gradient(135deg, var(--distance-blue-bright) 0%, var(--distance-blue-light) 100%);
            color: var(--text-inverse);
            padding: 1rem 2.5rem;
            border-radius: var(--radius-xl);
            font-weight: 800;
            font-size: 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.25s ease;
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="error-code">500</div>
        <div class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h1>Something Went Wrong</h1>
        <p>
            We're experiencing a temporary technical issue. 
            Our team has been notified and we're working to fix it.
        </p>
        <a href="/" class="btn-home">
            <i class="fas fa-home"></i> Back to Distance Hotel
        </a>
    </div>

</body>
</html>
